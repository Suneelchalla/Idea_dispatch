<style>
  :root {
    --paper: #f3ece0;
    --paper-deep: #ebe2d2;
    --ink: #1a1614;
    --ink-soft: #4a423b;
    --rule: #b8aa92;
    --accent: #c8341a;
    --accent-soft: #f1c9bf;
    --reddit: #c8341a;
    --hn: #d97706;
    --shadow: rgba(26, 22, 20, 0.08);
    --grain-opacity: 0.35;
    --controls-blur: rgba(235, 226, 210, 0.92);
    --star-saved: #d97706;
  }

  [data-theme="dark"] {
    --paper: #16110f;
    --paper-deep: #1f1916;
    --ink: #f3ece0;
    --ink-soft: #a89a82;
    --rule: #3a322c;
    --accent: #f5654a;
    --accent-soft: #4a2218;
    --reddit: #f5654a;
    --hn: #fbbf24;
    --shadow: rgba(0, 0, 0, 0.5);
    --grain-opacity: 0.15;
    --controls-blur: rgba(31, 25, 22, 0.92);
    --star-saved: #fbbf24;
  }

  [data-theme="dark"] body {
    background-image:
      radial-gradient(ellipse at top left, rgba(245, 101, 74, 0.06), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(58, 50, 44, 0.4), transparent 60%);
  }

  [data-theme="dark"] body::before { mix-blend-mode: screen; }
  [data-theme="dark"] .source-tag.news { background: #3b82f6; }
  [data-theme="dark"] .source-tag.india { background: #14b8a6; }
  [data-theme="dark"] .source-tag.regional { background: #a78bfa; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Newsreader', Georgia, serif;
    font-size: 17px;
    line-height: 1.55;
    min-height: 100vh;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .card, .controls, .filter-btn, .refresh-btn, .source-tag {
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }

  /* Greeting in masthead */
  .greeting {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
    text-transform: none;
    letter-spacing: 0;
    font-size: 13px;
  }

  /* Floating theme toggle in top-right corner of page */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--ink);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    z-index: 100;
    transition: all 0.25s ease;
    box-shadow: 0 2px 10px var(--shadow);
  }

  .theme-toggle:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    transform: rotate(-15deg);
  }

  @media (max-width: 600px) {
    .theme-toggle {
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      font-size: 13px;
    }
  }

  /* Theme toggle + save buttons */
  .icon-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .icon-btn:hover { background: var(--paper-deep); border-color: var(--ink); }

  .control-right { display: flex; gap: 8px; align-items: center; }

  .save-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0 6px;
    color: var(--ink-soft);
    transition: all 0.15s ease;
  }

  .save-btn:hover { transform: scale(1.15); color: var(--star-saved); }
  .save-btn.saved { color: var(--star-saved); }

  .filter-btn .count {
    margin-left: 6px;
    padding: 1px 6px;
    background: var(--accent);
    color: white;
    font-size: 9px;
    border-radius: 8px;
  }
  .filter-btn.active .count { background: white; color: var(--ink); }

  /* Two-row controls layout */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .controls-row-top { padding-bottom: 12px; border-bottom: 1px dotted var(--rule); }
  .controls { flex-direction: column; align-items: stretch; gap: 12px; }

  /* Search */

    if (read[url]) return;
    read[url] = Date.now();
    setReadMap(read);
    const card = document.querySelector(`[data-url="${CSS.escape(url)}"]`);
    if (card) card.classList.add('card-read');
  };
  // Drop read entries older than 30 days so localStorage doesn't bloat
  function cleanupRead() {
    const read = getRead();
    const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
    let changed = false;
    for (const url in read) {
      if (read[url] < cutoff) { delete read[url]; changed = true; }
    }
    if (changed) setReadMap(read);
  }

  // ---------- Saved items (localStorage) ----------
  const SAVE_KEY = 'idea-dispatch:saved';
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); }
    catch { return {}; }
  }
  function setSaved(map) {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(map)); } catch (e) { console.warn('Save failed', e); }
  }
  function isSaved(url) { return !!getSaved()[url]; }
  function updateSavedCount() {
    const n = Object.keys(getSaved()).length;
    const el = document.getElementById('savedCount');
    if (!el) return;
    el.textContent = n;
    el.style.display = n > 0 ? 'inline-block' : 'none';
  }

  window.toggleSave = function(btn) {
    const url = btn.dataset.url;
    const saved = getSaved();
    if (saved[url]) {
      delete saved[url];
      btn.classList.remove('saved');
      btn.textContent = '☆';
    } else {
      // Find item from current allItems
      const item = allItems.find(i => i.url === url);
      if (item) {
        saved[url] = { ...item, savedAt: Date.now() };
        btn.classList.add('saved');
        btn.textContent = '★';
      }
    }
    setSaved(saved);
    updateSavedCount();
    // If viewing saved tab, re-render so removed items disappear
    if (activeFilter === 'saved') render();
  };

  // ---------- Theme ----------
  const THEME_KEY = 'idea-dispatch:theme';
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀' : '☾';
    // Update theme-color meta for mobile chrome
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', theme === 'dark' ? '#16110f' : '#1a1614');
  }
  function loadTheme() {
    let theme = null;
    try { theme = localStorage.getItem(THEME_KEY); } catch {}
    if (!theme) {
      theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    applyTheme(theme);
  }
  function toggleTheme() {
    const current = document.documentElement.dataset.theme || 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    try { localStorage.setItem(THEME_KEY, next); } catch {}
  }

  // ---------- Greeting ----------
  function getGreeting() {
    const h = new Date().getHours();
    if (h < 5)  return 'Working late';
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    if (h < 21) return 'Good evening';
    return 'Good night';
  }

  // ---------- Time formatting ----------
  function timeAgo(ms) {
    const diff = Date.now() - ms;
    const s = Math.floor(diff / 1000);
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    if (d < 7) return d + 'd ago';
    return Math.floor(d / 7) + 'w ago';
  }

  function formatDate() {
    const d = new Date();
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function formatTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  // ---------- Fetchers ----------
  async function fetchReddit(sub) {
    try {
      const target = `https://www.reddit.com/r/${sub}/new.json?limit=15`;
      const data = await fetchViaProxy(target);
      if (!data || !data.data || !data.data.children) return [];
      return data.data.children
        .filter(c => !c.data.stickied)
        .map(c => {
          const td = c.data;
          let image = '';
          if (td.preview && td.preview.images && td.preview.images[0] && td.preview.images[0].source) {
            image = td.preview.images[0].source.url.replace(/&amp;/g, '&');
          } else if (td.thumbnail && /^https?:\/\//.test(td.thumbnail)) {
            image = td.thumbnail;
          }
          return {
            source: 'r/' + sub,
            platform: 'reddit',
            title: td.title,
            preview: (td.selftext || '').trim(),
            image,
            url: 'https://reddit.com' + td.permalink,
            score: td.score,
            comments: td.num_comments,
            createdAt: td.created_utc * 1000,
          };
        });
    } catch (e) {
      console.warn('Reddit fetch failed for ' + sub, e);
      return [];
    }
  }

  async function fetchHN(query) {
    try {
      const url = `https://hn.algolia.com/api/v1/search_by_date?tags=story&query=${encodeURIComponent(query)}&hitsPerPage=15`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return (data.hits || []).map(h => {
        let storyText = '';
        if (h.story_text) {
          storyText = h.story_text
            .replace(/<\/p>/gi, '\n\n')
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/<[^>]+>/g, '')
            .replace(/&#x27;/g, "'").replace(/&quot;/g, '"').replace(/&amp;/g, '&')
            .replace(/&lt;/g, '<').replace(/&gt;/g, '>')
            .replace(/\n{3,}/g, '\n\n')
            .trim();
        }
        return {
          source: 'Hacker News',
          platform: 'hn',
          title: h.title || h.story_title || '(untitled)',
          preview: storyText,
          image: '',
          url: h.url || `https://news.ycombinator.com/item?id=${h.objectID}`,
          score: h.points || 0,
          comments: h.num_comments || 0,
          createdAt: new Date(h.created_at).getTime(),
        };
      });
    } catch (e) {
      console.warn('HN fetch failed for "' + query + '"', e);
      return [];
    }
  }

  function extractFeedImage(item) {
    // 1. media:thumbnail or media:content (Yahoo Media RSS namespace)
    const els = item.getElementsByTagName('*');
    for (const el of els) {
      const ln = el.localName;
      if (ln === 'thumbnail' || ln === 'content') {
        const url = el.getAttribute('url') || el.getAttribute('href');
        if (!url) continue;
        const medium = el.getAttribute('medium');
        const type = el.getAttribute('type') || '';
        if (medium === 'image' || type.startsWith('image/') || /\.(jpe?g|png|webp|gif|avif)(\?|#|$)/i.test(url)) {
          return url;
        }
      }
    }
    // 2. <enclosure type="image/..." url="...">
    const enc = item.querySelector('enclosure');
    if (enc) {
      const type = enc.getAttribute('type') || '';
      const url = enc.getAttribute('url');
      if (url && type.startsWith('image/')) return url;
    }
    // 3. First <img src=""> inside description/content/summary
    const desc = item.querySelector('description, summary, content')?.textContent || '';
    const match = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
    if (match) return match[1].replace(/&amp;/g, '&');
    return '';
  }

  async function fetchNewsFeed(feed) {
    try {
      const xml = await fetchTextViaProxy(feed.url);
      const doc = new DOMParser().parseFromString(xml, 'application/xml');
      if (doc.querySelector('parsererror')) throw new Error('XML parse error');
      const items = doc.querySelectorAll('item, entry');
      const out = [];
      items.forEach((item, i) => {
        if (i >= 8) return;
        const title = (item.querySelector('title')?.textContent || '').trim();
        let link = item.querySelector('link')?.getAttribute('href')
                || item.querySelector('link')?.textContent || '';
        link = link.trim();
        const desc = (item.querySelector('description, summary, content')?.textContent || '').trim();
        const dateStr = item.querySelector('pubDate, published, updated')?.textContent;
        const createdAt = dateStr ? new Date(dateStr).getTime() : Date.now();
        const clean = desc.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        if (!title || !link) return;
        out.push({
          source: feed.name,
          platform: feed.platform || 'news',
          title,
          preview: clean.slice(0, 280),
          image: extractFeedImage(item),
          url: link,
          score: 0,
          comments: 0,
          createdAt: isNaN(createdAt) ? Date.now() : createdAt,
        });
      });
      return out;
    } catch (e) {
      console.warn('News fetch failed for ' + feed.name, e);
      return [];
    }
  }

  // ---------- Render ----------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function render() {
    const feed = document.getElementById('feed');
    let items;
    const isSavedTab = activeFilter === 'saved';

    if (isSavedTab) {
      const saved = getSaved();
      items = Object.values(saved).sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
    } else {
      const allowed = FILTER_GROUPS[activeFilter] || [];
      items = allItems.filter(i => allowed.includes(i.platform));
    }

    // Today-only filter (skip for Saved tab — saved items should always show)
    if (todayOnly && !isSavedTab) {
      items = items.filter(i => isToday(i.createdAt));
    }

    // Search filter (applies everywhere)
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      items = items.filter(i =>
        (i.title || '').toLowerCase().includes(q) ||
        (i.preview || '').toLowerCase().includes(q) ||
        (i.source || '').toLowerCase().includes(q)
      );
    }

    if (items.length === 0) {
      let msg, action = '';
      if (isSavedTab) {
        msg = 'No saved items yet. Tap the ☆ on any card to save it for later.';
      } else if (searchQuery) {
        msg = `No matches for &ldquo;${escapeHtml(searchQuery)}&rdquo;.`;
      } else if (todayOnly) {
        msg = 'Quiet so far today — feeds may still be updating.';
        action = '<button class="state-action" onclick="document.getElementById(\'todayToggle\').click()">Show yesterday too</button>';
      } else {
        msg = 'No items found from this source. Try refreshing or another filter.';
      }
      feed.innerHTML = `<div class="state">${msg}${action ? '<br><br>' + action : ''}</div>`;
      return;
    }

    feed.innerHTML = items.map((item, idx) => {
      const hasStats = item.score > 0 || item.comments > 0;
      const statsHtml = hasStats
        ? `<div class="stats">
             <span class="stat">▲ ${item.score}</span>
             <span class="stat">💬 ${item.comments}</span>
           </div>`
        : `<div class="stats" style="opacity:.6"><span class="stat">${escapeHtml(item.source)}</span></div>`;
      const saved = isSaved(item.url);
      const read = isRead(item.url);
      const saveBtn = `<button class="save-btn ${saved ? 'saved' : ''}" data-url="${escapeHtml(item.url)}" onclick="toggleSave(this)" title="${saved ? 'Unsave' : 'Save for later'}">${saved ? '★' : '☆'}</button>`;
      const isLong = item.preview && item.preview.length > 220;
      const previewHtml = item.preview
        ? `<p class="card-preview">${escapeHtml(item.preview)}</p>${isLong ? `<button class="expand-btn" onclick="toggleExpand(this); markRead('${escapeHtml(item.url)}')">Read full post ↓</button>` : ''}`
        : '<p class="card-preview" style="opacity:.5;font-style:italic">(no preview — click through to read)</p>';
      const imageHtml = item.image
        ? `<img class="card-image" src="${escapeHtml(item.image)}" loading="lazy" onerror="this.style.display='none'" alt="">`
        : '';
      const onClick = `onclick="markRead('${escapeHtml(item.url)}')"`;
      return `
      <article class="card ${read ? 'card-read' : ''}" data-url="${escapeHtml(item.url)}" style="animation-delay: ${Math.min(idx * 30, 600)}ms">
        ${imageHtml}
        <div class="card-head">
          <span class="source-tag ${item.platform}">${escapeHtml(item.source)}</span>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="timestamp">${timeAgo(item.createdAt)}</span>
            ${saveBtn}
          </div>
        </div>
        <h2 class="card-title"><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener" ${onClick}>${escapeHtml(item.title)}</a></h2>
        ${previewHtml}
        <div class="card-meta">
          ${statsHtml}
          <a class="open-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener" ${onClick}>Open ↗</a>
        </div>
      </article>
    `;
    }).join('');
  }

  // Expose globally so inline onclick can find it
  window.toggleExpand = function(btn) {
    const preview = btn.previousElementSibling;
    if (!preview) return;
    const isExpanded = preview.classList.toggle('expanded');
    btn.textContent = isExpanded ? 'Show less ↑' : 'Read full post ↓';
  };

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.innerHTML = `<div class="error-banner">⚠ ${escapeHtml(msg)}</div>`;
    setTimeout(() => { box.innerHTML = ''; }, 6000);
  }

  // ---------- Orchestrator ----------
  async function loadAll() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    document.getElementById('greeting').textContent = getGreeting();
    document.getElementById('dateOnly').textContent = formatDate();

    const tasks = [
      ...REDDIT_SUBS.map(fetchReddit),
      ...HN_QUERIES.map(fetchHN),
      ...NEWS_FEEDS.map(fetchNewsFeed),
      ...INDIA_FEEDS.map(fetchNewsFeed),
      ...REGIONAL_FEEDS.map(fetchNewsFeed),
    ];

    try {
      const results = await Promise.all(tasks);
      const combined = results.flat();

      // dedupe by url
      const seen = new Set();
      const deduped = [];
      for (const item of combined) {
        if (!seen.has(item.url)) {
          seen.add(item.url);
          deduped.push(item);
        }
      }

      // sort newest first
      deduped.sort((a, b) => b.createdAt - a.createdAt);
      allItems = deduped;

      if (allItems.length === 0) {
        showError('No ideas loaded. If you\'re previewing this inside another app, download the file and open it directly in your browser — sandboxed previews block external requests.');
      }

      render();
      document.getElementById('updatedLine').textContent = 'Last updated: ' + formatTime();
    } catch (e) {
      showError('Something went wrong loading ideas: ' + e.message);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // ---------- Wiring ----------
  document.getElementById('refreshBtn').addEventListener('click', loadAll);
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.source;
    render();
  });

  // Search
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  let searchDebounce;
  searchInput.addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    searchClear.classList.toggle('visible', searchQuery.length > 0);
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(render, 150);
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchClear.classList.remove('visible');
    render();
    searchInput.focus();
  });

  // Today toggle
  const todayBtn = document.getElementById('todayToggle');
  todayBtn.addEventListener('click', () => {
    todayOnly = !todayOnly;
    todayBtn.classList.toggle('active', todayOnly);
    todayBtn.textContent = todayOnly ? 'Today only' : 'All recent';
    render();
  });

  // initial setup
  loadTheme();
  cleanupRead();
  updateSavedCount();
  loadAll();
  setInterval(loadAll, REFRESH_MS);
</script>
</body>
</html>
